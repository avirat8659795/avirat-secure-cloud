<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Avirat's Secure Cloud</title>
    <style>
        body { background-color: #0a0e14; color: #00d4ff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: rgba(20, 30, 40, 0.9); padding: 40px; border: 1px solid #00d4ff; border-radius: 15px; box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); width: 300px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #00d4ff; background: rgba(0, 0, 0, 0.3); color: white; border-radius: 5px; outline: none; }
        button { background: #00d4ff; color: #0a0e14; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button:hover { background: #0099cc; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>AVIRAT'S CLOUD</h2>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">LOGIN</button>
        </form>
    </div>
</body>
</html>
