<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body { background-color: #0a0e14; color: #00d4ff; font-family: 'Segoe UI', sans-serif; padding: 50px; display: flex; justify-content: center; }
        .box { background: rgba(20, 30, 40, 0.9); padding: 30px; border: 1px solid #00d4ff; border-radius: 15px; width: 350px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #00d4ff; background: rgba(0, 0, 0, 0.3); color: white; border-radius: 5px; }
        button { background: #ff4d4d; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; }
        button:hover { background: #cc0000; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Welcome Avirat</h1>
        <p>Change your secure credentials below:</p>
        <form action="/update-credentials" method="POST">
            <input type="text" name="newUsername" placeholder="New Username" required>
            <input type="password" name="newPassword" placeholder="New Password" required>
            <button type="submit">UPDATE ACCOUNT</button>
        </form>
    </div>
</body>
</html>
